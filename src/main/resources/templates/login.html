<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>
</head>

<body>

<h2>User Login</h2>

<form th:action="@{/login}" method="post">

    Email:

    <input type="email"
           name="username">

    <br><br>

    Password:

    <input type="password"
           name="password">

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<a href="/register">
    Register New User
</a>

</body>
</html>
